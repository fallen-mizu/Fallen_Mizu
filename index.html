<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Online Ranking</title>

<style>
body {
    background: #0a0a0a;
    color: white;
    text-align: center;
    font-family: Arial;
}

canvas {
    background: #111;
    border: 2px solid #00ffcc;
    margin-top: 10px;
}

#leaderboard {
    margin-top: 20px;
}

input, button {
    padding: 8px;
    margin: 5px;
}
</style>
</head>
<body>

<h1>🐍 Snake Online</h1>

<input id="name" placeholder="Nama kamu">
<button onclick="startGame()">Start</button>

<h2>Score: <span id="score">0</span></h2>

<canvas id="game" width="400" height="400"></canvas>

<div id="leaderboard">
    <h2>🏆 Ranking</h2>
    <ul id="rank"></ul>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// 🔥 CONFIG FIREBASE (GANTI PUNYAMU)
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_PROJECT.firebaseapp.com",
  databaseURL: "https://ISI_PROJECT-default-rtdb.firebaseio.com",
  projectId: "ISI_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, food, dx, dy, score, player;

function startGame() {
    player = document.getElementById("name").value || "Player";
    
    snake = [{x: 200, y: 200}];
    dx = 20;
    dy = 0;
    score = 0;

    spawnFood();
    document.addEventListener("keydown", changeDir);

    gameLoop();
}

function spawnFood() {
    food = {
        x: Math.floor(Math.random() * 20) * 20,
        y: Math.floor(Math.random() * 20) * 20
    };
}

function changeDir(e) {
    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -20; }
    if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 20; }
    if (e.key === "ArrowLeft" && dx === 0) { dx = -20; dy = 0; }
    if (e.key === "ArrowRight" && dx === 0) { dx = 20; dy = 0; }
}

function gameLoop() {
    setTimeout(() => {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, 400, 400);

        let head = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Game over
        if (
            head.x < 0 || head.y < 0 ||
            head.x >= 400 || head.y >= 400 ||
            snake.some(s => s.x === head.x && s.y === head.y)
        ) {
            saveScore();
            return;
        }

        snake.unshift(head);

        // makan
        if (head.x === food.x && head.y === food.y) {
            score++;
            document.getElementById("score").innerText = score;
            spawnFood();
        } else {
            snake.pop();
        }

        // gambar ular
        ctx.fillStyle = "#00ffcc";
        snake.forEach(s => ctx.fillRect(s.x, s.y, 20, 20));

        // makanan
        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, 20, 20);

        gameLoop();
    }, 100);
}

// 🔥 SIMPAN SCORE ONLINE
function saveScore() {
    db.ref("scores").push({
        name: player,
        score: score
    });

    loadLeaderboard();
}

// 🔥 AMBIL RANKING
function loadLeaderboard() {
    db.ref("scores").orderByChild("score").limitToLast(10)
    .on("value", snapshot => {
        let data = [];
        snapshot.forEach(child => data.push(child.val()));

        data.sort((a, b) => b.score - a.score);

        let rank = document.getElementById("rank");
        rank.innerHTML = "";

        data.forEach((p, i) => {
            rank.innerHTML += `<li>${i+1}. ${p.name} - ${p.score}</li>`;
        });
    });
}

loadLeaderboard();
</script>

</body>
  </html>
